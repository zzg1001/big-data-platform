<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="dx-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f8fff"/>
      <stop offset="100%" stop-color="#0b4fc0"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#dx-g)"/>
  <!-- 白色 X：两条加粗圆头描边，表示双向数据流 -->
  <path d="M20 20 L44 44 M44 20 L20 44" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <!-- 四角小数据节点 -->
  <circle cx="20" cy="20" r="3.4" fill="#ffffff"/>
  <circle cx="44" cy="20" r="3.4" fill="#ffffff"/>
  <circle cx="20" cy="44" r="3.4" fill="#ffffff"/>
  <circle cx="44" cy="44" r="3.4" fill="#ffffff"/>
</svg>
